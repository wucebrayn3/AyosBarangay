{% extends "core/base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="card" style="max-width:420px; margin: 0 auto;">
  <h2>Login</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
  </form>
  <div class="meta">No account yet? <a href="{% url 'core:register' %}">Register here</a>.</div>
</div>
{% endblock %}
